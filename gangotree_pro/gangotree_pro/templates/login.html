<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Gangotree</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(26,35,126,.18);
      width: 100%; max-width: 400px; overflow: hidden;
    }
    .card-top {
      background: linear-gradient(135deg, #1a237e, #283593);
      padding: 2.5rem 2rem; text-align: center; color: #fff;
    }
    .card-top .logo {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .card-top .logo img { width: 52px; height: 52px; object-fit: contain; }
    .card-top h1 { font-size: 1.25rem; font-weight: 700; }
    .card-top p  { font-size: .8rem; opacity: .7; margin-top: .3rem; }
    .card-body { padding: 2rem; }
    .flash {
      padding: .7rem 1rem; border-radius: 8px; font-size: .83rem;
      margin-bottom: 1rem; background: #fdecea; color: #c62828;
      border-left: 4px solid #e53935;
    }
    .hint {
      background: #e8eaf6; border: 1px dashed #7986cb;
      border-radius: 8px; padding: .6rem 1rem; font-size: .77rem;
      color: #283593; margin-bottom: 1.2rem; line-height: 1.6;
    }
    label { display: block; font-size: .75rem; font-weight: 600; color: #666;
            text-transform: uppercase; letter-spacing: .5px; margin-bottom: .3rem; }
    .field { margin-bottom: 1rem; position: relative; }
    .field svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #bbb; }
    input {
      width: 100%; padding: .68rem 1rem .68rem 2.3rem;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-family: inherit; font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #1a237e; }
    .btn {
      width: 100%; padding: .78rem;
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: .93rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .9; }
    .back { display: block; text-align: center; margin-top: 1rem;
            font-size: .8rem; color: #aaa; }
    .back:hover { color: #1a237e; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo">
      <img src="{{ url_for('static', filename='gangologo.png') }}" alt="Gangotree">
    </div>
    <h1>Gangotree Admin</h1>
    <p>Sign in to manage your NGO dashboard</p>
  </div>
  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for _, msg in messages %}
        <div class="flash">⚠️ {{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <div class="hint">🔑 Default credentials: <strong>admin</strong> / <strong>admin123</strong></div>
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">🔐 Login to Admin Panel</button>
    </form>
    <a href="/" class="back">← Back to Website</a>
  </div>
</div>
</body>
</html>
